{% extends "base.html" %}

{% block content %}
{% for post in posts %}
<div class="post-entry">
  <h2><a href="{{ post.get_absolute_url }}">{{ post.title }}</a></h2>
  <p class="meta">Oleh: {{ post.author }} | {{ post.created_at|date:"d M Y" }}</p>
  <p>{{ post.body|truncatewords:20 }}</p>
  <a href="{{ post.get_absolute_url }}" class="read-more">Baca selengkapnya &rarr;</a>
</div>
{% endfor %}
{% endblock content %}
